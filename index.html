<p id="left">Loading years left...</p>

<script>
// ================== YOUR INFO (updated with exact birth time) ==================
const birthDate = new Date(1998, 10, 27, 20, 15, 0);
// November = month 10 (Jan=0), 20 = 8 PM, 15 = minutes, 0 = seconds

const lifeExpectancy = 81; // change this number if you want
// ========================================================================

function updateAge() {
const now = new Date();
const msLived = now - birthDate;
const years = msLived / (1000 * 60 * 60 * 24 * 365.2425); // accounts for leap years

document.getElementById('age').textContent =
`I am ${years.toFixed(15)} years old`;

const yearsLeft = lifeExpectancy - years;
document.getElementById('left').textContent =
`I probably have ${yearsLeft.toFixed(15)} years left`;
}

// Updates very frequently so the decimals move smoothly (like kavang.com)
setInterval(updateAge, 10);
updateAge(); // start immediately
</script>
</body>
