<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sachin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0e;
      color: #d0ffd0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow: hidden;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.25;
    }

    .content {
      text-align: center;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 4.8rem;
      font-weight: 700;
      letter-spacing: -2px;
      color: transparent;
      background: linear-gradient(90deg, #00ff88, #00ccff, #aa88ff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 12s linear infinite, breathe 8s ease-in-out infinite;
      margin-bottom: 3rem;
    }

    .stats {
      font-size: 1.7rem;
      line-height: 2.1;
      margin: 2rem 0 3.5rem;
      opacity: 0;
      animation: fadeInUp 1.4s ease-out 0.8s forwards;
    }

    #age {
      color: #00ffaa;
      font-weight: 500;
    }

    #left {
      color: #ff7777;
      font-weight: 500;
    }

    .github-link {
      display: inline-block;
      margin-top: 2rem;
      font-size: 1.35rem;
      color: #66ddff;
      text-decoration: none;
      border: 1px solid #3388aa;
      padding: 0.8rem 1.8rem;
      border-radius: 6px;
      transition: all 0.35s ease;
      opacity: 0;
      animation: fadeInUp 1.6s ease-out 1.2s forwards;
    }

    .github-link:hover {
      background: rgba(40, 180, 220, 0.15);
      border-color: #00ccff;
      color: #ccffff;
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.25);
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.02); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 { font-size: 3.6rem; }
      .stats { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <div class="content">
    <h1>Sachin</h1>

    <div class="stats">
      <div id="age">Loading your age...</div>
      <div id="left">Loading years left...</div>
    </div>

    <a href="https://github.com/0warlord0" class="github-link" target="_blank" rel="noopener">
      → GitHub
    </a>
  </div>

  <script>
    // ─── Background subtle particles ───
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.6 + 0.4,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3
      });
    }

    function animateBg() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(100, 255, 180, 0.5)';
        ctx.fill();
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();

    // ─── Age calculator ───
    const birthDate = new Date(1998, 10, 27, 20, 15, 0); // Nov 27 1998 8:15 PM
    const lifeExpectancy = 91;

    function updateAge() {
      const now = new Date();
      const msLived = now - birthDate;
      const years = msLived / (1000 * 60 * 60 * 24 * 365.2425);

      document.getElementById('age').textContent =
        `I am ${years.toFixed(15)} years old`;

      const yearsLeft = lifeExpectancy - years;
      document.getElementById('left').textContent =
        `I probably have ${yearsLeft.toFixed(15)} years left`;
    }

    setInterval(updateAge, 10);
    updateAge();
  </script>
</body>
</html>
